<!DOCTYPE html>
<html lang="en">
<head>

<title>INGENIA — India's Engineering Intelligence Hub</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#06071A;color:#E2E2F0;min-height:100vh}
.hdr{background:#08091E;border-bottom:1px solid rgba(255,107,0,.3);padding:11px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:300}
.logo{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;background:linear-gradient(120deg,#FF6B00,#FFB347);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tagline{font-size:8.5px;color:rgba(226,226,240,.3);letter-spacing:2px;text-transform:uppercase}
.pill{background:rgba(255,107,0,.12);border:1px solid rgba(255,107,0,.35);color:#FF9240;font-size:9px;padding:3px 10px;border-radius:20px;white-space:nowrap}
.tabbar{display:flex;gap:1px;padding:7px 16px 0;background:#09091E;border-bottom:1px solid rgba(255,255,255,.05);overflow-x:auto;scrollbar-width:none;position:sticky;top:52px;z-index:200}
.tabbar::-webkit-scrollbar{display:none}
.tab{padding:7px 13px;border-radius:6px 6px 0 0;background:transparent;border:none;color:rgba(226,226,240,.35);font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:.15s}
.tab:hover{color:rgba(226,226,240,.75)}
.tab.active{color:#FF6B00;border-bottom:2px solid #FF6B00;background:rgba(255,107,0,.08)}
.page{padding:18px;max-width:1080px;margin:0 auto}
h2.st{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:#FFF;margin-bottom:3px}
p.ss{font-size:11px;color:rgba(226,226,240,.38);margin-bottom:13px;line-height:1.6}
.chbar{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:13px}
.cbtn{padding:5px 12px;border-radius:5px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);color:rgba(226,226,240,.48);font-family:'DM Sans',sans-serif;font-size:10px;cursor:pointer;transition:.15s;white-space:nowrap}
.cbtn:hover{border-color:rgba(255,107,0,.3);color:#FF9240}
.cbtn.sel{border-color:#FF6B00;background:rgba(255,107,0,.1);color:#FF9240}
.chbody{display:none}.chbody.open{display:block}
.scbar{background:#0C0E24;border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:11px 15px;margin-bottom:11px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.scnum{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:#FF6B00}
.sclbl{font-size:9px;color:rgba(226,226,240,.38);text-transform:uppercase;letter-spacing:1px}
.progw{flex:1;min-width:100px}
.progbg{height:5px;background:rgba(255,255,255,.07);border-radius:3px}
.progf{height:5px;background:linear-gradient(90deg,#FF6B00,#4ECDA4);border-radius:3px;transition:.3s}
.qcard{background:#0C0E24;border:1px solid rgba(255,255,255,.07);border-radius:11px;padding:14px;margin-bottom:9px}
.qhdr{display:flex;align-items:flex-start;gap:8px;margin-bottom:9px}
.qnum{font-family:'Syne',sans-serif;font-size:10px;font-weight:800;color:#FF6B00;background:rgba(255,107,0,.12);border:1px solid rgba(255,107,0,.2);padding:2px 7px;border-radius:4px;white-space:nowrap;margin-top:3px}
.qsrc{font-size:8.5px;background:rgba(0,200,110,.09);color:#4ECDA4;border:1px solid rgba(0,200,110,.18);padding:2px 6px;border-radius:4px;white-space:nowrap;margin-top:3px}
.qtxt{font-size:12.5px;font-weight:600;color:#FFF;line-height:1.6;flex:1}
.opts{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.opt{padding:8px 12px;border-radius:7px;border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.03);color:rgba(226,226,240,.68);font-size:11.5px;cursor:pointer;text-align:left;font-family:'DM Sans',sans-serif;transition:.15s;width:100%}
.opt:hover:not([disabled]){border-color:rgba(255,107,0,.38);background:rgba(255,107,0,.06);color:#FFF}
.opt.correct{border-color:#4ECDA4!important;background:rgba(0,200,110,.09)!important;color:#4ECDA4!important}
.opt.wrong{border-color:#FF7070!important;background:rgba(255,60,60,.07)!important;color:#FF7070!important}
.opt.muted{opacity:.35}
.abox{background:rgba(255,255,255,.04);border-radius:6px;padding:10px 13px;font-size:11px;color:rgba(226,226,240,.75);line-height:1.75;border-left:3px solid #FF6B00;display:none;margin-top:2px}
.abox.show{display:block}
.abox b{color:#FF9240}
.abox code{background:rgba(255,255,255,.08);padding:1px 5px;border-radius:3px;font-family:monospace;font-size:10.5px;color:#7AAFFF}
.btn{background:linear-gradient(120deg,#FF6B00,#FF9500);border:none;color:#FFF;padding:7px 14px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:.15s}
.btn:hover{opacity:.88}
.btn-o{background:rgba(255,107,0,.1);border:1px solid rgba(255,107,0,.26);color:#FF9240}
.btn-g{background:rgba(0,200,110,.1);border:1px solid rgba(0,200,110,.26);color:#4ECDA4}
.egrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;margin-bottom:18px}
.ecard{background:#0C0E24;border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:16px;transition:.15s}
.ecard:hover{border-color:rgba(255,107,0,.25)}
.ename{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:#FFF;margin-bottom:2px}
.eorg{font-size:10px;color:rgba(226,226,240,.38);margin-bottom:9px}
.tg{display:inline-block;font-size:8.5px;padding:2px 7px;border-radius:20px;background:rgba(0,200,110,.1);color:#4ECDA4;border:1px solid rgba(0,200,110,.18);margin-bottom:8px}
.erow{font-size:11px;color:rgba(226,226,240,.55);line-height:1.9}
.erow b{color:#FF9240}
.tipbox{background:rgba(255,107,0,.06);border:1px solid rgba(255,107,0,.14);border-radius:6px;padding:9px 11px;font-size:10.5px;color:rgba(226,226,240,.65);line-height:1.6;margin-top:9px}
.tipbox b{color:#FF9240}
.tl{position:relative;padding-left:22px}
.tl::before{content:'';position:absolute;left:7px;top:0;bottom:0;width:1.5px;background:rgba(255,107,0,.2)}
.tli{position:relative;margin-bottom:14px}
.tld{position:absolute;left:-17px;top:4px;width:8px;height:8px;border-radius:50%;background:#FF6B00}
.tldate{display:inline-block;font-size:9px;padding:1px 6px;border-radius:4px;background:rgba(255,107,0,.1);color:#FF9240;margin-bottom:3px}
.tlt{font-size:12px;font-weight:600;color:#FFF;margin-bottom:2px}
.tlb{font-size:10.5px;color:rgba(226,226,240,.42);line-height:1.55}
.sets-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:8px;margin-bottom:14px}
.setbtn{background:#0C0E24;border:1px solid rgba(255,255,255,.08);border-radius:9px;padding:12px;cursor:pointer;text-align:center;transition:.15s}
.setbtn:hover{border-color:rgba(255,107,0,.28)}
.setbtn.done{border-color:#4ECDA4}
.setn{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:#FF6B00}
.setl{font-size:10px;font-weight:600;color:#FFF;margin:2px 0}
.setm{font-size:8.5px;color:rgba(226,226,240,.38)}
.setd{font-size:9px;color:#4ECDA4;margin-top:3px}
.xprog{height:3px;background:rgba(255,255,255,.07);border-radius:2px;margin-bottom:11px}
.xprogf{height:3px;background:linear-gradient(90deg,#FF6B00,#FF9500);border-radius:2px;transition:.3s}
.xtop{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:6px}
.xqn{font-size:9.5px;color:rgba(226,226,240,.35)}
.xtmr{font-size:15px;font-weight:700;color:#FF9240;font-variant-numeric:tabular-nums}
.xtmr.warn{color:#FF5050;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.xsrc{font-size:8px;background:rgba(255,107,0,.1);color:#FF9240;border:1px solid rgba(255,107,0,.15);padding:2px 6px;border-radius:20px}
.xcard{background:#0C0E24;border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:16px}
.rcard{background:#0C0E24;border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:20px;text-align:center}
.rbig{font-family:'Syne',sans-serif;font-size:44px;font-weight:800;color:#FF6B00}
.rpct{font-size:13px;color:rgba(226,226,240,.42);margin-bottom:4px}
.rrat{font-size:17px;font-weight:700;margin:6px 0}
.rbar{height:6px;background:rgba(255,255,255,.07);border-radius:3px;margin:10px 0}
.rbarf{height:6px;border-radius:3px;transition:width 1s}
.rstats{display:flex;gap:10px;justify-content:center;margin:10px 0;flex-wrap:wrap}
.rs{background:rgba(255,255,255,.04);border-radius:6px;padding:8px 13px;text-align:center}
.rsn{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:#FFF}
.rsl{font-size:8px;color:rgba(226,226,240,.35);text-transform:uppercase;letter-spacing:1px}
.rv{padding:5px 10px;border-radius:5px;font-size:10.5px;margin-bottom:4px}
.rvc{background:rgba(0,200,110,.09);border:1px solid rgba(0,200,110,.2);color:#4ECDA4}
.rvw{background:rgba(255,60,60,.06);border:1px solid rgba(255,60,60,.16);color:#FF9090}
.rvn{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);color:rgba(226,226,240,.42)}
.rvexp{font-size:10px;color:rgba(226,226,240,.55);padding:6px 9px;background:rgba(255,255,255,.04);border-radius:5px;margin-top:4px;line-height:1.6;border-left:2px solid #FF6B00}
.ibox{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:11px;margin:11px 0;font-size:11px;color:rgba(226,226,240,.48);line-height:2}
@media(max-width:600px){.hdr{padding:9px 12px}.page{padding:13px}.qtxt{font-size:11.5px}.opt{font-size:10.5px}}
</style>

var DB,EXAMS,STEPS,SETS;
var curTab=null,curCh=null,answered={},testState=null,testTimer=null,scores={};
function eid(id){return document.getElementById(id)}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function qe(s){return(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'")}
function fmt(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}
function rat(p){
  if(p>=90)return{l:'🏆 Outstanding — JEE Ready!',c:'#4ECDA4'};
  if(p>=75)return{l:'⭐ Excellent — Board Topper',c:'#FF9240'};
  if(p>=60)return{l:'👍 Good — Keep Practicing',c:'#7AAFFF'};
  if(p>=40)return{l:'📚 Average — Review Concepts',c:'#FFB84D'};
  return{l:'💪 Keep Going — You Got This!',c:'#FF7070'};
}
function sh(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=0|Math.random()*(i+1);var t=b[i];b[i]=b[j];b[j]=t;}return b;}

var TABS=[
  {id:'phyxi',l:'⚛ Physics XI',sk:'Physics XI'},
  {id:'phyxii',l:'⚛ Physics XII',sk:'Physics XII'},
  {id:'chemxi',l:'🧪 Chemistry XI',sk:'Chemistry XI'},
  {id:'chemxii',l:'🧪 Chemistry XII',sk:'Chemistry XII'},
  {id:'mathxi',l:'∑ Maths XI',sk:'Maths XI'},
  {id:'mathxii',l:'∑ Maths XII',sk:'Maths XII'},
  {id:'python',l:'🐍 Python XII',sk:'Python XII'},
  {id:'english',l:'📖 English XII',sk:'English XII'},
  {id:'exams',l:'🎯 Exam Info',sk:''},
  {id:'tests',l:'📝 Sample Tests',sk:''},
];

function initTabs(){
  var bar=eid('tabbar');
  TABS.forEach(function(t,i){
    var b=document.createElement('button');
    b.className='tab'+(i===0?' active':'');
    b.innerHTML=t.l;b.id='tb-'+t.id;
    b.onclick=function(){switchTab(t.id,i);};
    bar.appendChild(b);
  });
  switchTab('phyxi',0);
}

function switchTab(id,idx){
  curTab=id;curCh=null;
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('active');});
  var el=eid('tb-'+id);if(el)el.classList.add('active');
  renderPage(id);window.scrollTo(0,0);
}

function renderPage(id){
  var pc=eid('pc');
  if(id==='exams'){pc.innerHTML=renderExams();return;}
  if(id==='tests'){pc.innerHTML=renderTestMenu();return;}
  var tab=TABS.find(function(t){return t.id===id;});
  if(!tab||!tab.sk){pc.innerHTML='<p>Coming soon</p>';return;}
  var data=DB[tab.sk];
  if(!data){pc.innerHTML='<p>No data</p>';return;}
  var subtitles={
    'Physics XI':'Engineering entrance focused — JEE 2018-2025 patterns + predicted',
    'Physics XII':'JEE Main + CBSE Board — PYQs 2018-2024 + predicted 2025',
    'Chemistry XI':'Atomic structure, bonding, thermodynamics — JEE entry focus',
    'Chemistry XII':'Electrochemistry, kinetics, organic — JEE + CBSE board patterns',
    'Maths XI':'Algebra, sequences, binomial, trig + coordinate geometry',
    'Maths XII':'Calculus, matrices, determinants, probability — JEE + Board',
    'Python XII':'CBSE Class XII CS — basics, OOP, SQL, file handling',
    'English XII':'Flamingo, Vistas, writing skills — CBSE board exam patterns',
  };
  pc.innerHTML=renderSubject(tab.sk,data,tab.sk,subtitles[tab.sk]||'');
}

function renderSubject(sk,data,title,subtitle){
  var chs=Object.keys(data);
  var h='<h2 class="st">'+title+'</h2><p class="ss">'+subtitle+'</p><div class="chbar">';
  chs.forEach(function(ch){
    h+='<button class="cbtn" id="cb-'+qe(ch)+'" onclick="toggleCh(\''+qe(ch)+'\',\''+qe(sk)+'\')">'+esc(ch)+'</button>';
  });
  h+='</div>';
  chs.forEach(function(ch){
    var ck=qe(ch);var qs=data[ch];
    h+='<div class="chbody" id="chb-'+ck+'">';
    h+='<div class="scbar"><div><div class="scnum" id="sn-'+ck+'">0/'+qs.length+'</div><div class="sclbl">Correct/Done</div></div>'+
       '<div class="progw"><div class="progbg"><div class="progf" id="pf-'+ck+'" style="width:0%"></div></div></div>'+
       '<div id="rt-'+ck+'" style="font-size:10px;color:rgba(226,226,240,.4);">'+qs.length+' questions</div>'+
       '<button class="btn btn-o" style="font-size:10px;padding:5px 10px" onclick="resetCh(\''+ck+'\',\''+qe(sk)+'\')">Reset</button></div>';
    qs.forEach(function(q,i){h+=renderQ(ck,q,i);});
    h+='</div>';
  });
  return h;
}

function toggleCh(ch,sk){
  if(curCh===ch){
    var el=eid('chb-'+ch);if(el)el.classList.remove('open');
    var btn=eid('cb-'+ch);if(btn)btn.classList.remove('sel');
    curCh=null;return;
  }
  if(curCh){
    var prev=eid('chb-'+curCh);if(prev)prev.classList.remove('open');
    var pb=eid('cb-'+curCh);if(pb)pb.classList.remove('sel');
  }
  curCh=ch;
  var el=eid('chb-'+ch);if(el){el.classList.add('open');setTimeout(function(){el.scrollIntoView({behavior:'smooth',block:'start'});},50);}
  var btn=eid('cb-'+ch);if(btn)btn.classList.add('sel');
}

function renderQ(ck,q,i){
  var qid=ck+'_'+i;
  var h='<div class="qcard" id="qc-'+qid+'"><div class="qhdr">'+
    '<span class="qnum">Q'+(i+1)+'</span>'+
    '<span class="qsrc">'+esc(q.s||'')+'</span>'+
    '<div class="qtxt">'+esc(q.q)+'</div></div><div class="opts">';
  q.o.forEach(function(opt,j){
    h+='<button class="opt" id="op-'+qid+'-'+j+'" onclick="pick(\''+ck+'\','+i+','+j+')">'+
       String.fromCharCode(65+j)+') '+esc(opt)+'</button>';
  });
  h+='</div><div class="abox" id="ab-'+qid+'"><b>Model Answer: </b>'+(q.e||'')+'</div></div>';
  return h;
}

function getQ(ck,qi){
  var sks=Object.keys(DB);
  for(var i=0;i<sks.length;i++){
    var chs=DB[sks[i]];
    for(var ch in chs){
      if(qe(ch)===ck){var qs=chs[ch];return qs[qi]||null;}
    }
  }
  return null;
}

function pick(ck,qi,chosen){
  var qid=ck+'_'+qi;
  var ab=eid('ab-'+qid);if(ab&&ab.classList.contains('show'))return;
  var q=getQ(ck,qi);if(!q)return;
  q.o.forEach(function(_,j){
    var btn=eid('op-'+qid+'-'+j);if(!btn)return;
    btn.disabled=true;
    if(j===q.a)btn.classList.add('correct');
    else if(j===chosen)btn.classList.add('wrong');
    else btn.classList.add('muted');
  });
  if(ab)ab.classList.add('show');
  if(!answered[ck])answered[ck]={};
  answered[ck][qi]=(chosen===q.a);
  updateScore(ck);
}

function updateScore(ck){
  var ans=answered[ck]||{};
  var done=Object.keys(ans).length;
  var correct=Object.values(ans).filter(Boolean).length;
  var total=0;
  var sks=Object.keys(DB);
  for(var i=0;i<sks.length;i++){var chs=DB[sks[i]];for(var ch in chs){if(qe(ch)===ck){total=chs[ch].length;break;}}if(total)break;}
  var sn=eid('sn-'+ck);if(sn)sn.textContent=correct+'/'+done;
  var pf=eid('pf-'+ck);if(pf)pf.style.width=(done/total*100)+'%';
  var rt=eid('rt-'+ck);
  if(rt){
    if(done===total){var r=rat(Math.round(correct/total*100));rt.style.color=r.c;rt.textContent=Math.round(correct/total*100)+'% — '+r.l;}
    else rt.textContent=(total-done)+' remaining';
  }
}

function resetCh(ck,sk){
  delete answered[ck];
  document.querySelectorAll('[id^="op-'+ck+'_"]').forEach(function(b){b.className='opt';b.disabled=false;});
  document.querySelectorAll('[id^="ab-'+ck+'_"]').forEach(function(el){el.classList.remove('show');});
  var total=0;var sks=Object.keys(DB);
  for(var i=0;i<sks.length;i++){var chs=DB[sks[i]];for(var ch in chs){if(qe(ch)===ck){total=chs[ch].length;break;}}if(total)break;}
  var sn=eid('sn-'+ck);if(sn)sn.textContent='0/'+total;
  var pf=eid('pf-'+ck);if(pf)pf.style.width='0%';
  var rt=eid('rt-'+ck);if(rt){rt.style.color='rgba(226,226,240,.4)';rt.textContent=total+' questions';}
}

function renderExams(){
  var h='<h2 class="st">🎯 Engineering Entrance Exams — Complete Guide</h2>'+
    '<p class="ss">Registration dates, eligibility, exam patterns, fees and proven strategies based on 7+ years of patterns.</p>'+
    '<div class="egrid">';

function renderTestMenu(){
  if(testState&&testState.phase==='exam')return renderExamPage();
  if(testState&&testState.phase==='result')return renderResultPage();
  if(testState&&testState.phase==='review')return renderReviewPage();
  var h='<h2 class="st">📝 JEE Main Sample Tests</h2>'+
    '<p class="ss">5 full timed mock tests (180 min each) — JEE Main pattern questions based on 2018-2024 PYQs and predicted 2025.</p>'+
    '<div class="ibox">⏱ 180 min per set &nbsp;|&nbsp; 15 Questions per set &nbsp;|&nbsp; +4 correct, −1 wrong &nbsp;|&nbsp; Full model answers after each question &nbsp;|&nbsp; Percentile rating at end</div>'+
    '<div class="sets-grid">';
  SETS.forEach(function(s,i){
    var sc=scores[i];
    h+='<div class="setbtn'+(sc?' done':'')+'" onclick="startTest('+i+')">'+
      '<div class="setn">#'+(i+1)+'</div>'+
      '<div class="setl">'+esc(s.name)+'</div>'+
      '<div class="setm">⏱ 180 min · '+s.qs.length+' Q</div>'+
      (sc?'<div class="setd">✅ Score: '+sc.score+'/'+sc.total+' ('+sc.pct+'%)</div>':'')+
      '</div>';
  });
  h+='</div>';
  return h;
}

function startTest(idx){
  if(testTimer)clearInterval(testTimer);
  var set=SETS[idx];
  testState={idx:idx,set:set,qs:sh(set.qs.slice()),i:0,chosen:null,revealed:false,secsLeft:set.time*60,phase:'exam',ans:[]};
  testTimer=setInterval(function(){
    testState.secsLeft--;
    var el=eid('tmr');
    if(el){el.textContent=fmt(testState.secsLeft);el.className='xtmr'+(testState.secsLeft<300?' warn':'');}
    if(testState.secsLeft<=0){clearInterval(testTimer);finishTest();}
  },1000);
  eid('pc').innerHTML=renderExamPage();
}

function renderExamPage(){
  var s=testState,q=s.qs[s.i];
  var prog=Math.round(s.i/s.qs.length*100);
  var h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:11px;flex-wrap:wrap;gap:8px">'+
    '<h2 class="st" style="font-size:15px;margin:0">'+esc(s.set.name)+'</h2>'+
    '<span class="xtmr" id="tmr">'+fmt(s.secsLeft)+'</span></div>'+
    '<div class="xprog"><div class="xprogf" style="width:'+prog+'%"></div></div>'+
    '<div class="xcard"><div class="xtop">'+
    '<span class="xqn">Q '+(s.i+1)+' / '+s.qs.length+'</span>'+
    '<span class="xsrc">'+esc(q.s||'')+'</span></div>'+
    '<div class="qtxt" style="margin-bottom:14px">'+esc(q.q)+'</div><div class="opts">';
  q.o.forEach(function(opt,j){
    var cls='opt';
    if(s.revealed){if(j===q.a)cls+=' correct';else if(j===s.chosen)cls+=' wrong';else cls+=' muted';}
    h+='<button class="'+cls+'" '+(s.revealed?'disabled':'')+' onclick="testPick('+j+')">'+String.fromCharCode(65+j)+') '+esc(opt)+'</button>';
  });
  h+='</div>';
  if(s.revealed)h+='<div class="abox show"><b>Model Answer: </b>'+(q.e||'')+'</div>';
  h+='<div style="display:flex;justify-content:space-between;margin-top:12px;flex-wrap:wrap;gap:8px">';
  if(s.revealed){
    var isLast=(s.i+1>=s.qs.length);
    h+='<button class="btn" onclick="testNext()">'+(isLast?'View Results ▶':'Next Question ▶')+'</button>';
  } else h+='<span style="font-size:10px;color:rgba(226,226,240,.3)">Select an option to continue</span>';
  h+='<button class="btn btn-o" style="font-size:10px;padding:5px 10px" onclick="endTestEarly()">End Test</button></div></div>';
  return h;
}

function testPick(j){if(testState.revealed)return;testState.chosen=j;testState.revealed=true;eid('pc').innerHTML=renderExamPage();}
function testNext(){
  var s=testState,q=s.qs[s.i];
  s.ans.push({q:q,chosen:s.chosen,correct:q.a});
  if(s.i+1>=s.qs.length)finishTest();
  else{s.i++;s.chosen=null;s.revealed=false;eid('pc').innerHTML=renderExamPage();}
}
function endTestEarly(){clearInterval(testTimer);testState.phase='result';finishTest();}
function finishTest(){
  clearInterval(testTimer);
  var s=testState;
  var sc=s.ans.filter(function(a){return a.chosen===a.correct;}).length;
  var pct=Math.round(sc/s.qs.length*100);
  scores[s.idx]={score:sc,total:s.qs.length,pct:pct};
  testState.phase='result';testState.finalScore=sc;testState.finalPct=pct;
  eid('pc').innerHTML=renderResultPage();
}
function renderResultPage(){
  var s=testState,sc=s.finalScore,tot=s.qs.length,pct=s.finalPct;
  var r=rat(pct);var wrong=s.ans.filter(function(a){return a.chosen!==null&&a.chosen!==a.correct;}).length;
  var raw=sc*4-wrong*1;
  var h='<div class="rcard">'+
    '<div class="rbig">'+sc+'/'+tot+'</div>'+
    '<div class="rpct">'+pct+'% correct</div>'+
    '<div class="rrat" style="color:'+r.c+'">'+r.l+'</div>'+
    '<div class="rbar"><div class="rbarf" style="width:'+pct+'%;background:'+r.c+'"></div></div>'+
    '<div class="rstats">'+
    '<div class="rs"><div class="rsn" style="color:#4ECDA4">'+sc+'</div><div class="rsl">Correct (+4)</div></div>'+
    '<div class="rs"><div class="rsn" style="color:#FF7070">'+wrong+'</div><div class="rsl">Wrong (−1)</div></div>'+
    '<div class="rs"><div class="rsn">'+raw+'</div><div class="rsl">JEE Raw Score</div></div>'+
    '</div>'+
    '<div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:14px">'+
    '<button class="btn" onclick="reviewTest()">📖 Review Answers</button>'+
    '<button class="btn btn-o" onclick="startTest('+s.idx+')">🔄 Retake</button>'+
    '<button class="btn btn-g" onclick="backToMenu()">← All Sets</button>'+
    '</div></div>';
  return h;
}
function reviewTest(){testState.phase='review';eid('pc').innerHTML=renderReviewPage();}
function renderReviewPage(){
  var s=testState,sc=s.finalScore,tot=s.qs.length,r=rat(s.finalPct);
  var h='<h2 class="st">Answer Review — '+esc(s.set.name)+'</h2>'+
    '<p class="ss">Score: <b style="color:#FF6B00">'+sc+'/'+tot+' ('+s.finalPct+'%)</b> — '+r.l+'</p>';
  s.ans.forEach(function(a,i){
    var ok=a.chosen===a.correct;
    h+='<div style="background:#0C0E24;border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:12px;margin-bottom:8px">'+
      '<div style="display:flex;justify-content:space-between;margin-bottom:5px">'+
      '<span style="font-size:9px;color:rgba(226,226,240,.3)">Q'+(i+1)+' · '+esc(a.q.s||'')+'</span>'+
      '<span style="font-size:10.5px;font-weight:600;color:'+(ok?'#4ECDA4':'#FF7070')+'">'+(ok?'✅ Correct':'❌ Wrong')+'</span></div>'+
      '<div style="font-size:12px;font-weight:600;color:#FFF;margin-bottom:7px;line-height:1.5">'+esc(a.q.q)+'</div>';
    a.q.o.forEach(function(opt,j){
      var cls=j===a.q.a?'rv rvc':j===a.chosen&&!ok?'rv rvw':'rv rvn';
      h+='<div class="'+cls+'">'+String.fromCharCode(65+j)+') '+esc(opt)+(j===a.q.a?' ✓':'')+(j===a.chosen&&!ok?' ✗':'')+'</div>';
    });
    h+='<div class="rvexp">'+(a.q.e||'')+'</div></div>';
  });
  h+='<div style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap">'+
    '<button class="btn btn-o" onclick="testState.phase=\'result\';eid(\'pc\').innerHTML=renderResultPage()">← Score Card</button>'+
    '<button class="btn" onclick="startTest('+s.idx+')">🔄 Retake</button>'+
    '<button class="btn btn-g" onclick="backToMenu()">← All Sets</button></div>';
  return h;
}
function backToMenu(){if(testTimer)clearInterval(testTimer);testState=null;eid('pc').innerHTML=renderTestMenu();}

initTabs();
</script>
</body>
</html>
