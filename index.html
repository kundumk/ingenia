async function callClaude(prompt) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000, messages: [{ role: "user", content: prompt }] }),
  });
  const data = await res.json();
  return data.content.map(b => b.text || "").join("");
}

      <p className="sec-s">Select any chapter to instantly generate the 5 most important questions with complete model answers (JEE + Board ready).</p>
      <div className="row">
        <select value={ch} onChange={e => { setCh(e.target.value); setTxt(""); }}>
          <option value="">Select a chapter...</option>
          {chs.map(c => <option key={c} value={c}>{c}</option>)}
        </select>
        <button className="btn" disabled={!ch || load} onClick={go}>Generate Q & A</button>
      </div>
      {load && <Loader/>}
      {txt && <div className="ai-box"><div className="ai-txt">{txt}</div></div>}
    </div>
  );
}

function CBSETab() {
  const [sub, setSub] = useState("Physics");
  const [ch, setCh] = useState("");
  const [txt, setTxt] = useState("");
  const [load, setLoad] = useState(false);
  const go = useCallback(async () => {
    if (!ch) return;
    setLoad(true); setTxt("");
    try {
      const r = await callClaude("You are a CBSE Class XI " + sub + " expert examiner. For chapter \"" + ch + "\" create a full CBSE Higher Secondary Board-style question set:\n- 2 Very Short Answer (1 mark each)\n- 2 Short Answer Type-I (2 marks each)\n- 2 Short Answer Type-II (3 marks each)\n- 2 Long Answer (5 marks each)\n- 1 Case-Based Question (4 marks, with a 4-5 line scenario)\nFor every question provide a complete CBSE-style model answer with step-by-step working and marks allocated clearly. Match exact CBSE board style and difficulty.");
      setTxt(r);
    } catch(e) { setTxt("Error. Please try again."); }
    setLoad(false);
  }, [sub, ch]);
  return (
    <div>
      <h2 className="sec-t">CBSE Higher Secondary Board Exam Prep</h2>
      <p className="sec-s">Select subject and chapter to generate a complete CBSE-format question paper with mark-wise model answers.</p>
      <div className="row">
        <select value={sub} onChange={e => { setSub(e.target.value); setCh(""); setTxt(""); }} style={{maxWidth:"180px"}}>
          {Object.keys(CBSE_MAP).map(s => <option key={s}>{s}</option>)}
        </select>
        <select value={ch} onChange={e => { setCh(e.target.value); setTxt(""); }}>
          <option value="">Select chapter...</option>
          {CBSE_MAP[sub].map(c => <option key={c} value={c}>{c}</option>)}
        </select>
        <button className="btn" disabled={!ch || load} onClick={go}>Generate Board Questions</button>
      </div>
      {load && <Loader/>}
      {txt && <div className="ai-box"><div className="ai-txt">{txt}</div></div>}
    </div>
  );
}
