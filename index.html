html,body{font-family:'DM Sans',sans-serif;background:#06071A;color:#E2E2F0;min-height:100vh;}
.hdr{background:#08091E;border-bottom:1px solid rgba(255,107,0,.3);padding:13px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;background:linear-gradient(120deg,#FF6B00,#FFB347);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-1px;}

.tb{padding:9px 14px;border-radius:8px 8px 0 0;background:transparent;border:none;color:rgba(226,226,240,.4);font-family:'DM Sans',sans-serif;font-size:11.5px;font-weight:500;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:.2s;}

.page{padding:26px 22px;max-width:1080px;margin:0 auto;}
.sec-t{font-family:'Syne',sans-serif;font-size:21px;font-weight:800;color:#FFF;margin-bottom:6px;}
.sec-s{font-size:12.5px;color:rgba(226,226,240,.45);margin-bottom:22px;line-height:1.65;}
.grid2{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
.card{background:#0C0E24;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:18px;transition:.2s;}

.ct{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:#FFF;margin-bottom:6px;}

.en{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:#FFF;}

.hero-empty{text-align:center;padding:44px 20px;}
.hero-empty .icon{font-size:48px;margin-bottom:14px;}
.hero-empty p{font-size:13.5px;color:rgba(226,226,240,.5);margin-bottom:22px;line-height:1.7;}

.news-card.green{border-left-color:#3ECDA4;}
.news-cat{font-size:9.5px;text-transform:uppercase;letter-spacing:1.5px;color:#FF9240;margin-bottom:6px;font-weight:600;}
.news-card.blue .news-cat{color:#7AAFFF;}
.news-card.green .news-cat{color:#3ECDA4;}

let _apiKey = "";
function setApiKey(k){ _apiKey = k.trim(); }

async function callClaude(prompt) {
  const headers = { "Content-Type": "application/json", "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" };
  if (_apiKey) headers["x-api-key"] = _apiKey;
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers,
    body: JSON.stringify({ model: "claude-opus-4-5-20251101", max_tokens: 1200, messages: [{ role: "user", content: prompt }] }),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || "API error " + res.status);
  }
  const data = await res.json();
  return data.content.map(b => b.text || "").join("");
}
