*{box-sizing:border-box;margin:0;padding:0;}
html,body{font-family:'DM Sans',sans-serif;background:#06071A;color:#E2E2F0;min-height:100vh;}
.hdr{background:#08091E;border-bottom:1px solid rgba(255,107,0,.3);padding:11px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;}
.logo{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;background:linear-gradient(120deg,#FF6B00,#FFB347);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.tagline{font-size:8.5px;color:rgba(226,226,240,.32);letter-spacing:2px;text-transform:uppercase;}
.pill{background:rgba(255,107,0,.12);border:1px solid rgba(255,107,0,.35);color:#FF9240;font-size:9px;padding:3px 10px;border-radius:20px;white-space:nowrap;}
.apib{background:#070920;border-bottom:1px solid rgba(255,107,0,.15);padding:7px 20px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.apib-lbl{font-size:10.5px;color:rgba(226,226,240,.4);white-space:nowrap;}
.apib-inp{background:#06071A;border:1px solid rgba(255,107,0,.25);color:#E2E2F0;padding:5px 10px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:11px;outline:none;flex:1;min-width:160px;max-width:320px;}
.apib-inp:focus{border-color:#FF6B00;}
.apib-ok{font-size:10px;color:#4ECDA4;}
.apib-hint{font-size:9.5px;color:rgba(226,226,240,.22);}
.apib-hint a{color:#7AAFFF;text-decoration:none;}
.tabbar{display:flex;gap:1px;padding:7px 16px 0;background:#09091E;border-bottom:1px solid rgba(255,255,255,.05);overflow-x:auto;scrollbar-width:none;position:sticky;top:86px;z-index:99;}
.tabbar::-webkit-scrollbar{display:none;}
.tb{padding:7px 11px;border-radius:6px 6px 0 0;background:transparent;border:none;color:rgba(226,226,240,.35);font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:.15s;}
.tb:hover{color:rgba(226,226,240,.75);background:rgba(255,255,255,.04);}
.tb.on{color:#FF6B00;border-bottom:2px solid #FF6B00;background:rgba(255,107,0,.08);}
.page{padding:20px 18px;max-width:1060px;margin:0 auto;}
.sec-t{font-family:'Syne',sans-serif;font-size:19px;font-weight:800;color:#FFF;margin-bottom:4px;}
.sec-s{font-size:11.5px;color:rgba(226,226,240,.4);margin-bottom:16px;line-height:1.6;}
.grid2{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:11px;}
.card{background:#0C0E24;border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:14px;transition:.18s;}
.card:hover{border-color:rgba(255,107,0,.28);transform:translateY(-2px);}
.ci{font-size:18px;margin-bottom:7px;}.ct{font-family:'Syne',sans-serif;font-size:12.5px;font-weight:800;color:#FFF;margin-bottom:4px;}
.cs{font-size:10.5px;color:rgba(226,226,240,.45);margin-bottom:8px;line-height:1.55;}
.sal{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:#FF6B00;}
.sal-l{font-size:8px;color:rgba(226,226,240,.28);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px;}
.lbl{font-size:8px;color:rgba(226,226,240,.28);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:2px;margin-top:8px;}
.tag{display:inline-block;padding:1px 7px;border-radius:20px;font-size:9px;font-weight:500;margin:2px;}
.to{background:rgba(255,107,0,.13);color:#FF9240;border:1px solid rgba(255,107,0,.22);}
.tb2{background:rgba(56,136,255,.1);color:#7AAFFF;border:1px solid rgba(56,136,255,.18);}
.tg{background:rgba(0,200,110,.1);color:#4ECDA4;border:1px solid rgba(0,200,110,.18);}
.db{font-size:9px;padding:1px 7px;border-radius:20px;display:inline-block;}
.dxh{background:rgba(255,60,60,.12);color:#FF7070;border:1px solid rgba(255,60,60,.22);}
.dvh{background:rgba(255,150,0,.12);color:#FFB84D;border:1px solid rgba(255,150,0,.22);}
.dh{background:rgba(0,200,110,.1);color:#4ECDA4;border:1px solid rgba(0,200,110,.18);}
.dmh{background:rgba(100,150,255,.1);color:#90AEFF;border:1px solid rgba(100,150,255,.18);}
.ec{background:#0C0E24;border:1px solid rgba(255,255,255,.07);border-radius:11px;padding:14px;margin-bottom:10px;}
.en{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:#FFF;}
.eb{font-size:9.5px;color:rgba(226,226,240,.3);margin-top:1px;}
.egrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
.ei-lbl{font-size:8px;color:rgba(226,226,240,.28);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:2px;}
.ei-val{font-size:10.5px;color:#E2E2F0;}
.etip{margin-top:9px;padding:8px 10px;background:rgba(255,107,0,.06);border-radius:6px;border:1px solid rgba(255,107,0,.12);font-size:10.5px;color:rgba(226,226,240,.62);line-height:1.55;}
.etip b{color:#FF9240;}
.tl{position:relative;padding-left:20px;}
.tl::before{content:'';position:absolute;left:5px;top:0;bottom:0;width:1.5px;background:rgba(255,107,0,.16);}
.tli{position:relative;margin-bottom:14px;}
.tld{position:absolute;left:-17px;top:3px;width:7px;height:7px;border-radius:50%;background:#FF6B00;}
.tldate{display:inline-block;font-size:9px;padding:1px 6px;border-radius:4px;background:rgba(255,107,0,.1);color:#FF9240;margin-bottom:3px;}
.tlt{font-size:12px;font-weight:600;color:#FFF;margin-bottom:2px;}
.tlb{font-size:10.5px;color:rgba(226,226,240,.42);line-height:1.55;}
.btn{background:linear-gradient(120deg,#FF6B00,#FF9500);border:none;color:#FFF;padding:8px 15px;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:11.5px;font-weight:600;cursor:pointer;transition:.15s;}
.btn:hover{opacity:.88;transform:translateY(-1px);}
.btn:disabled{opacity:.28;cursor:not-allowed;transform:none;}
.btn-o{background:rgba(255,107,0,.1);border:1px solid rgba(255,107,0,.26);color:#FF9240;}
.btn-g{background:rgba(0,200,110,.1);border:1px solid rgba(0,200,110,.26);color:#4ECDA4;}
.btn-b{background:rgba(56,136,255,.1);border:1px solid rgba(56,136,255,.26);color:#7AAFFF;}
select{background:#0C0E24;border:1px solid rgba(255,255,255,.1);color:#E2E2F0;padding:7px 10px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:11px;outline:none;cursor:pointer;width:100%;max-width:280px;}
select:focus{border-color:rgba(255,107,0,.5);}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px;}
.ai-box{background:#0C0E24;border:1px solid rgba(255,107,0,.15);border-radius:11px;padding:16px;}
.ai-txt{font-size:11.5px;line-height:1.9;color:rgba(226,226,240,.85);white-space:pre-wrap;}
.ld{display:flex;align-items:center;gap:6px;color:rgba(255,107,0,.7);font-size:11.5px;padding:12px 0;}
.dot{width:5px;height:5px;background:#FF6B00;border-radius:50%;animation:bop 1.2s infinite;}
.dot:nth-child(2){animation-delay:.2s;}.dot:nth-child(3){animation-delay:.4s;}
@keyframes bop{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-5px);}}
.err{background:rgba(255,60,60,.07);border:1px solid rgba(255,60,60,.18);border-radius:8px;padding:12px 14px;font-size:11px;color:#FF9090;line-height:1.7;}
.err b{color:#FFB0B0;}
.ngrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:10px;margin-bottom:14px;}
.nc{background:#0C0E24;border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:12px;border-left:3px solid #FF6B00;}
.nc.bl{border-left-color:#5B8CFF;}.nc.gr{border-left-color:#3ECDA4;}
.nc-cat{font-size:8px;text-transform:uppercase;letter-spacing:1.5px;color:#FF9240;margin-bottom:4px;font-weight:600;}
.nc.bl .nc-cat{color:#7AAFFF;}.nc.gr .nc-cat{color:#3ECDA4;}
.nc-title{font-size:11.5px;font-weight:600;color:#FFF;margin-bottom:3px;line-height:1.4;}
.nc-body{font-size:10px;color:rgba(226,226,240,.48);line-height:1.55;}
.nc-date{font-size:8.5px;color:rgba(226,226,240,.22);margin-top:5px;}
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px;}
.cc{background:#0C0E24;border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:13px;transition:.15s;}
.cc:hover{border-color:rgba(255,107,0,.22);}
.cc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
.cc-name{font-family:'Syne',sans-serif;font-size:12px;font-weight:800;color:#FFF;}
.cc-free{font-size:8px;padding:2px 6px;border-radius:20px;background:rgba(0,200,110,.1);color:#4ECDA4;border:1px solid rgba(0,200,110,.2);}
.cc-paid{font-size:8px;padding:2px 6px;border-radius:20px;background:rgba(255,107,0,.1);color:#FF9240;border:1px solid rgba(255,107,0,.22);}
.cc-sub{font-size:9.5px;color:rgba(226,226,240,.35);margin-bottom:6px;}
.cc-desc{font-size:10.5px;color:rgba(226,226,240,.62);line-height:1.55;margin-bottom:7px;}
.cc-link{font-size:9.5px;color:#FF9240;text-decoration:none;}
.tw{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:13px;}
.tbtn{padding:5px 11px;border-radius:5px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);color:rgba(226,226,240,.48);font-family:'DM Sans',sans-serif;font-size:10px;cursor:pointer;transition:.15s;white-space:nowrap;}
.tbtn:hover{border-color:rgba(255,107,0,.25);color:#FF9240;}
.tbtn.sel{border-color:#FF6B00;background:rgba(255,107,0,.1);color:#FF9240;}
.topic-card{background:#0C0E24;border:1px solid rgba(255,255,255,.07);border-radius:12px;margin-bottom:12px;overflow:hidden;}
.topic-hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 15px;cursor:pointer;transition:.15s;}
.topic-hdr:hover{background:rgba(255,107,0,.05);}
.topic-name{font-family:'Syne',sans-serif;font-size:12.5px;font-weight:800;color:#FFF;}
.topic-body{padding:0 15px 14px;}
.topic-desc{font-size:10.5px;color:rgba(226,226,240,.52);line-height:1.6;margin-bottom:11px;}

.links-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:9px;}
.lnk{font-size:9.5px;padding:3px 9px;border-radius:5px;background:rgba(56,136,255,.08);color:#7AAFFF;border:1px solid rgba(56,136,255,.15);text-decoration:none;}
.lnk:hover{background:rgba(56,136,255,.15);}
.sh{font-family:'Syne',sans-serif;font-size:11px;font-weight:800;color:rgba(226,226,240,.6);margin:9px 0 7px;}
.ex-card{background:#0C0E24;border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:18px;}
.ex-prog{height:3px;background:rgba(255,255,255,.07);border-radius:2px;margin-bottom:12px;}
.ex-prog-fill{height:3px;background:linear-gradient(90deg,#FF6B00,#FF9500);border-radius:2px;transition:.3s;}
.ex-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:11px;flex-wrap:wrap;gap:6px;}
.ex-qnum{font-size:9.5px;color:rgba(226,226,240,.35);}
.ex-timer{font-size:14px;font-weight:700;color:#FF9240;font-variant-numeric:tabular-nums;}
.ex-timer.warn{color:#FF5050;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.ex-src{font-size:8px;background:rgba(255,107,0,.1);color:#FF9240;border:1px solid rgba(255,107,0,.16);padding:2px 6px;border-radius:20px;}
.ex-q{font-size:13px;font-weight:600;color:#FFF;line-height:1.6;margin-bottom:14px;}
.ex-opts{display:flex;flex-direction:column;gap:7px;margin-bottom:15px;}
.ex-opt{padding:9px 12px;border-radius:7px;border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.03);color:rgba(226,226,240,.7);font-size:11.5px;cursor:pointer;text-align:left;font-family:'DM Sans',sans-serif;transition:.15s;}
.ex-opt:hover:not(:disabled){border-color:rgba(255,107,0,.36);background:rgba(255,107,0,.06);color:#FFF;}
.ex-opt.chosen{border-color:#FF6B00;background:rgba(255,107,0,.1);color:#FFF;}
.ex-opt.correct{border-color:#4ECDA4;background:rgba(0,200,110,.08);color:#4ECDA4;}
.ex-opt.wrong{border-color:#FF7070;background:rgba(255,60,60,.06);color:#FF7070;}
.ex-opt:disabled{cursor:default;}
.ex-exp{background:rgba(255,255,255,.04);border-radius:6px;padding:9px 11px;font-size:10.5px;color:rgba(226,226,240,.65);line-height:1.6;margin-bottom:11px;border-left:3px solid #FF6B00;}
.set-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:9px;margin-bottom:16px;}
.set-card{background:#0C0E24;border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:13px;cursor:pointer;transition:.15s;text-align:center;}
.set-card:hover{border-color:rgba(255,107,0,.3);transform:translateY(-2px);}
.set-card.done{border-color:#4ECDA4;}
.set-num{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:#FF6B00;margin-bottom:3px;}
.set-name{font-size:10.5px;font-weight:600;color:#FFF;margin-bottom:3px;}
.set-meta{font-size:9px;color:rgba(226,226,240,.35);}
.set-score{font-size:9.5px;color:#4ECDA4;margin-top:4px;}
.res-card{background:#0C0E24;border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:20px;text-align:center;}
.res-score-big{font-family:'Syne',sans-serif;font-size:48px;font-weight:800;color:#FF6B00;}
.res-pct{font-size:13px;color:rgba(226,226,240,.42);margin-bottom:4px;}
.res-rating{font-size:18px;font-weight:700;margin:7px 0;}
.res-bar{height:6px;background:rgba(255,255,255,.07);border-radius:3px;margin:11px 0;}
.res-bar-fill{height:6px;border-radius:3px;transition:width 1s;}
.res-stats{display:flex;gap:10px;justify-content:center;margin:11px 0;flex-wrap:wrap;}
.res-stat{background:rgba(255,255,255,.04);border-radius:6px;padding:8px 13px;text-align:center;}
.rs-n{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:#FFF;}
.rs-l{font-size:8px;color:rgba(226,226,240,.35);text-transform:uppercase;letter-spacing:1px;}
.rev-q{background:#0C0E24;border:1px solid rgba(255,255,255,.06);border-radius:9px;padding:12px;margin-bottom:9px;}
.rev-q-txt{font-size:12px;font-weight:600;color:#FFF;margin-bottom:8px;line-height:1.5;}
.rev-opt{padding:5px 10px;border-radius:5px;font-size:10.5px;margin-bottom:4px;}
.rev-c{background:rgba(0,200,110,.09);border:1px solid rgba(0,200,110,.2);color:#4ECDA4;}
.rev-w{background:rgba(255,60,60,.06);border:1px solid rgba(255,60,60,.16);color:#FF9090;}
.rev-n{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);color:rgba(226,226,240,.42);}
.rev-exp{font-size:10px;color:rgba(226,226,240,.55);padding:6px 9px;background:rgba(255,255,255,.04);border-radius:5px;margin-top:5px;line-height:1.6;border-left:2px solid #FF6B00;}
.hero{text-align:center;padding:34px 16px;}
.hero .ico{font-size:40px;margin-bottom:10px;}
.hero p{font-size:12px;color:rgba(226,226,240,.42);margin-bottom:16px;line-height:1.7;}
.setup-card{background:#0C0E24;border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:18px;max-width:600px;}
.setup-card h3{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:#FFF;margin-bottom:4px;}
.info-box{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:11px;margin:12px 0;font-size:11px;color:rgba(226,226,240,.48);line-height:2;}
@media(max-width:600px){.egrid{grid-template-columns:1fr;}.hdr{padding:9px 12px;}.page{padding:13px 11px;}}
</style>

function ExamEngine({examName,sets,onBack}){
  const [phase,setPhase]=useState("menu");
  const [selSet,setSelSet]=useState(null);
  const [qs,setQs]=useState([]);
  const [idx,setIdx]=useState(0);
  const [chosen,setChosen]=useState(null);
  const [answers,setAnswers]=useState([]);
  const [revealed,setRevealed]=useState(false);
  const [secsLeft,setSecsLeft]=useState(0);
  const [scores,setScores]=useState({});
  const timerRef=useRef(null);
  const stopTimer=useCallback(()=>{if(timerRef.current){clearInterval(timerRef.current);timerRef.current=null;}},[]);
  useEffect(()=>()=>stopTimer(),[]);
  const startSet=useCallback((set)=>{
    const q=shuffle(set.qs);
    setSelSet(set);setQs(q);setIdx(0);setChosen(null);setAnswers([]);setRevealed(false);
    setSecsLeft(set.time*60);setPhase("exam");
    timerRef.current=setInterval(()=>setSecsLeft(s=>{if(s<=1){clearInterval(timerRef.current);setPhase("result");return 0;}return s-1;}),1000);
  },[]);
  const choose=useCallback(i=>{if(chosen!==null)return;setChosen(i);setRevealed(true);},[chosen]);
  const next=useCallback(()=>{
    const na=[...answers,{q:qs[idx],chosen,correct:qs[idx].a}];
    setAnswers(na);
    if(idx+1>=qs.length){stopTimer();const sc=na.filter(a=>a.chosen===a.correct).length;setScores(p=>({...p,[selSet.id]:{score:sc,total:qs.length,pct:Math.round(sc/qs.length*100)}}));setPhase("result");}
    else{setIdx(i=>i+1);setChosen(null);setRevealed(false);}
  },[answers,qs,idx,chosen,selSet,stopTimer]);
  const fmt=s=>`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
  const finalScore=phase==="result"?answers.filter(a=>a.chosen===a.correct).length:0;
  const pct=qs.length?Math.round(finalScore/qs.length*100):0;
  const rat=getRating(pct);
  if(phase==="menu")return(
    <div>
      <div style={{display:"flex",alignItems:"center",gap:"9px",marginBottom:"14px",flexWrap:"wrap"}}>
        <button className="btn btn-o" style={{fontSize:"10px",padding:"5px 9px"}} onClick={onBack}>Back</button>
        <h2 className="sec-t" style={{margin:0}}>{examName} - Select Exam Set</h2>
      </div>
      <p className="sec-s">5 full exam sets. Real exam feel with countdown timer. Complete each set to get your rating and full answer review.</p>
      <div className="set-grid">{sets.map(s=>{const sc=scores[s.id];return(
        <div className={"set-card"+(sc?" done":"")} key={s.id} onClick={()=>startSet(s)}>
          <div className="set-num">#{s.id}</div>
          <div className="set-name">{s.name}</div>
          <div className="set-meta">Timer: {s.time} min | {s.qs.length} Questions</div>
          {sc&&<div className="set-score">Done: {sc.score}/{sc.total} ({sc.pct}%)</div>}
        </div>
      );})}
      </div>
      <div style={{background:"rgba(255,107,0,.05)",border:"1px solid rgba(255,107,0,.15)",borderRadius:"9px",padding:"13px",fontSize:"11px",color:"rgba(226,226,240,.55)",lineHeight:"2"}}>
        <b style={{color:"#FF9240"}}>How the exam works:</b><br/>
        1. Click a set to start. Timer begins immediately (counts DOWN like real exam).<br/>
        2. Select your answer for each MCQ. Correct answer + explanation shown instantly.<br/>
        3. After all questions: Score card with your Rating (JEE Ready / Excellent / Good / Average / Keep Going).<br/>
        4. Full answer review with step-by-step justification for every question.<br/>
        5. Retake same set or try a different one!
      </div>
    </div>
  );
  if(phase==="exam"&&qs.length){const q=qs[idx];const warn=secsLeft<120;return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"11px",flexWrap:"wrap",gap:"7px"}}>
        <div><div style={{fontFamily:"Syne",fontSize:"12.5px",fontWeight:"800",color:"#FFF"}}>{selSet.name}</div><div style={{fontSize:"9px",color:"rgba(226,226,240,.3)"}}>{examName}</div></div>
        <span className={"ex-timer"+(warn?" warn":"")}>Timer: {fmt(secsLeft)}{warn?" WARNING":""}</span>
      </div>
      <div className="ex-card">
        <div className="ex-prog"><div className="ex-prog-fill" style={{width:(idx/qs.length*100)+"%"}}/></div>
        <div className="ex-meta">
          <span className="ex-qnum">Question {idx+1} of {qs.length}</span>
          <span className="ex-src">{q.s||"Competitive Exam"}</span>
        </div>
        <div className="ex-q">{q.q}</div>
        <div className="ex-opts">{q.o.map((opt,i)=>{
          let c="ex-opt";
          if(revealed){if(i===q.a)c+=" correct";else if(i===chosen)c+=" wrong";}
          else if(i===chosen)c+=" chosen";
          return <button key={i} className={c} onClick={()=>choose(i)} disabled={revealed}>{String.fromCharCode(65+i)}) {opt}</button>;
        })}</div>
        {revealed&&<div className="ex-exp"><b>Explanation: </b>{q.e}</div>}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:"7px"}}>
          {revealed&&<button className="btn" onClick={next}>{idx+1>=qs.length?"View Results":"Next Question"}</button>}
          {!revealed&&<span style={{fontSize:"10px",color:"rgba(226,226,240,.3)"}}>Select an answer to continue</span>}
          <button className="btn btn-o" style={{fontSize:"10px",padding:"5px 9px"}} onClick={()=>{stopTimer();setPhase("menu");}}>End Exam</button>
        </div>
      </div>
    </div>
  );}
  if(phase==="result")return(
    <div>
      <div className="res-card">
        <div className="res-score-big">{finalScore}/{qs.length}</div>
        <div className="res-pct">{pct}% Correct</div>
        <div className="res-rating" style={{color:rat.col}}>{rat.lbl}</div>
        <div className="res-bar"><div className="res-bar-fill" style={{width:pct+"%",background:rat.col}}/></div>
        <div className="res-stats">
          <div className="res-stat"><div className="rs-n" style={{color:"#4ECDA4"}}>{finalScore}</div><div className="rs-l">Correct</div></div>
          <div className="res-stat"><div className="rs-n" style={{color:"#FF7070"}}>{qs.length-finalScore}</div><div className="rs-l">Wrong</div></div>
          <div className="res-stat"><div className="rs-n">{pct}%</div><div className="rs-l">Score</div></div>
        </div>
        <div style={{display:"flex",gap:"7px",justifyContent:"center",flexWrap:"wrap",marginTop:"13px"}}>
          <button className="btn" onClick={()=>setPhase("review")}>Review All Answers</button>
          <button className="btn btn-o" onClick={()=>startSet(selSet)}>Retake This Set</button>
          <button className="btn btn-g" onClick={()=>{stopTimer();setPhase("menu");}}>New Set</button>
        </div>
      </div>
    </div>
  );
  if(phase==="review")return(
    <div>
      <h2 className="sec-t">Answer Review - {selSet.name}</h2>
      <p className="sec-s">Score: <b style={{color:"#FF6B00"}}>{finalScore}/{qs.length} ({pct}%)</b> | {rat.lbl}</p>
      {answers.map((a,i)=>{const ok=a.chosen===a.correct;return(
        <div className="rev-q" key={i}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:"6px"}}>
            <span style={{fontSize:"9px",color:"rgba(226,226,240,.3)"}}>Q{i+1} | {a.q.s}</span>
            <span style={{fontSize:"10.5px",fontWeight:600,color:ok?"#4ECDA4":"#FF7070"}}>{ok?"Correct":"Wrong"}</span>
          </div>
          <div className="rev-q-txt">{a.q.q}</div>
          {a.q.o.map((opt,j)=>{
            let c="rev-opt";
            if(j===a.q.a)c+=" rev-c";else if(j===a.chosen&&!ok)c+=" rev-w";else c+=" rev-n";
            return <div className={c} key={j}>{String.fromCharCode(65+j)}) {opt}{j===a.q.a?" [CORRECT]":""}{j===a.chosen&&!ok?" [YOUR ANSWER]":""}</div>;
          })}
          <div className="rev-exp">Explanation: {a.q.e}</div>
        </div>
      );})}
      <div style={{display:"flex",gap:"7px",marginTop:"13px",flexWrap:"wrap"}}>
        <button className="btn btn-o" onClick={()=>setPhase("result")}>Back to Score</button>
        <button className="btn" onClick={()=>startSet(selSet)}>Retake</button>
        <button className="btn btn-g" onClick={()=>{stopTimer();setPhase("menu");}}>New Set</button>
        <button className="btn btn-b" onClick={()=>{stopTimer();setPhase("menu");onBack();}}>All Exams</button>
      </div>
    </div>
  );
  return null;
}

  const [open,setOpen]=useState(null);
  const [selT,setSelT]=useState("");
  const [txt,setTxt]=useState("");const [load,setLoad]=useState(false);const [err,setErr]=useState("");
  const go=useCallback(async(tname)=>{
    setSelT(tname);setLoad(true);setTxt("");setErr("");
    try{
      const r=await callClaude("You are an expert "+sub+" teacher for Class XI CBSE and JEE students in India.\nFor the chapter/topic \""+tname+"\" provide:\n1. CHAPTER OVERVIEW (3 lines: key concepts, JEE+CBSE Board relevance, approximate marks weightage)\n2. TOP 10 MOST IMPORTANT QUESTIONS with COMPLETE MODEL ANSWERS.\n   Mix: 3 conceptual (2-3 marks each), 4 numerical/problem-solving (3-5 marks each), 2 application (3 marks each), 1 long answer (5 marks).\n   For each question:\n   Q[number] ([marks]M): [the question]\n   Answer: [complete step-by-step solution including formula used, working shown clearly, final answer with units]\n3. EXAMINER TIP: One key strategy for scoring full marks on this chapter in both JEE and CBSE board.\nWrite for competitive exam success alongside board exam preparation.");
      setTxt(r);
    }catch(e){setErr(e.message);}
    setLoad(false);
  },[sub]);
  return(
    <div>
      <h2 className="sec-t">{sub} - Class XI</h2>
      <p className="sec-s">Click any topic to expand: quick-revision video, deep-dive resource links, and AI Top 10 Q&A for JEE + CBSE Board.</p>
      {topicList.map((t,i)=>(
        <div className="topic-card" key={t.name}>
          <div className="topic-hdr" onClick={()=>setOpen(open===i?null:i)}>
            <div className="topic-name">{t.name}</div>
            <div style={{display:"flex",alignItems:"center",gap:"7px"}}>
              <span className="tag to" style={{fontSize:"8px"}}>Video + Links</span>
              <span style={{color:"rgba(226,226,240,.3)",fontSize:"13px"}}>{open===i?"▲":"▼"}</span>
            </div>
          </div>
          {open===i&&(
            <div className="topic-body">
              <div className="topic-desc">{t.desc}</div>

              <div className="sh">Deep Dive Resources</div>
              <div className="links-row">{t.links.map(l=><a key={l.t} className="lnk" href={l.u} target="_blank" rel="noreferrer">{l.t}</a>)}</div>
              <div className="sh">AI Top 10 Q&A for JEE + Board</div>
              <div className="row">
                <button className="btn" disabled={load&&selT===t.name} onClick={()=>go(t.name)}>
                  {load&&selT===t.name?"Generating...":"Generate Top 10 Q&A"}
                </button>
              </div>
              {load&&selT===t.name&&<Loader/>}
              {err&&selT===t.name&&<ErrBox msg={err}/>}
              {txt&&selT===t.name&&<div className="ai-box"><div className="ai-txt">{txt}</div></div>}
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

function AIGenTab({title,topics,promptFn}){
  const [topic,setTopic]=useState("");const [txt,setTxt]=useState("");const [load,setLoad]=useState(false);const [err,setErr]=useState("");
  const go=useCallback(async()=>{if(!topic)return;setLoad(true);setTxt("");setErr("");try{const r=await callClaude(promptFn(topic));setTxt(r);}catch(e){setErr(e.message);}setLoad(false);},[topic,promptFn]);
  return(
    <div>
      <h2 className="sec-t">{title}</h2>
      <p className="sec-s">Select a topic then click Generate. AI creates Top 10 questions with complete model answers for CBSE board.</p>
      <div className="tw">{topics.map(t=><button key={t} className={"tbtn"+(topic===t?" sel":"")} onClick={()=>{setTopic(t);setTxt("");setErr("");}}>{t}</button>)}</div>
      {topic&&<div style={{marginBottom:"12px",display:"flex",gap:"8px",alignItems:"center",flexWrap:"wrap"}}>
        <span style={{fontSize:"10.5px",color:"rgba(226,226,240,.38)"}}>Selected: <b style={{color:"#FF9240"}}>{topic}</b></span>
        <button className="btn" disabled={load} onClick={go}>Generate Top 10</button>
      </div>}
      {load&&<Loader/>}{err&&<ErrBox msg={err}/>}
      {txt&&<div className="ai-box"><div className="ai-txt">{txt}</div></div>}
    </div>
  );
}

function ProgramsTab(){
  const dm={Extremely:"dxh",Very:"dvh",High:"dh",Moderate:"dmh"};
  return(<div><h2 className="sec-t">Best Engineering Programs - India 2025</h2><p className="sec-s">Market analysis from NASSCOM, AICTE and live industry hiring data.</p>
  <div className="grid2">{PROG_DATA.map(p=>{const dk=dm[p.d.split(" ")[0]]||"dh";return(
    <div className="card" key={p.n}>
      <div className="ci">{p.e}</div><div className="ct">{p.n}</div><div className="cs">{p.o}</div>
      <div className="sal">{p.s}</div><div className="sal-l">Avg CTC Range</div>
      <span className={"db "+dk}>{p.d} Demand</span>
      <span className="lbl">Top Colleges</span>{p.c.map(c=><span className="tag tb2" key={c}>{c}</span>)}
      <span className="lbl">Hot Specialisations</span>{p.sp.map(s=><span className="tag to" key={s}>{s}</span>)}
    </div>
  );})}</div></div>);}

{EXAMS_D.map(e=>(<div className="ec" key={e.n}>
  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:"6px"}}>
    <div><div className="en">{e.n}</div><div className="eb">{e.b}</div></div>
    <span className="tag tg">{e.lv}</span>
  </div>
  <div className="egrid">
    <div><span className="ei-lbl">Registration</span><span className="ei-val">{e.reg}</span></div>
    <div><span className="ei-lbl">Exam Date</span><span className="ei-val">{e.dt}</span></div>
    <div><span className="ei-lbl">Eligibility</span><span className="ei-val">{e.elig}</span></div>

  </div>

</div>);}

function EnrollTab(){return(<div><h2 className="sec-t">How to Enroll - Complete Roadmap</h2><p className="sec-s">Every deadline, every fee, every action item for the 2024-25 admission cycle.</p>
<div className="tl">{STEPS_D.map(s=>(<div className="tli" key={s.t}><div className="tld"/><div className="tldate">{s.dt}</div><div className="tlt">{s.t}</div><div className="tlb">{s.b}</div></div>))}</div></div>);}

function NewsTab(){
  const [ct,setCt]=useState("");const [cc,setCc]=useState("");const [cl,setCl]=useState(false);const [co,setCo]=useState(false);const [ce,setCe]=useState("");const [coe,setCoe]=useState("");
  const fC=useCallback(async()=>{setCl(true);setCe("");try{const r=await callClaude("Give 4 recent 2025 CBSE board exam updates for Class XI-XII students in India. Cover policy changes, date announcements, syllabus changes, result news. Each update: HEADLINE: text | DETAILS: 2-3 lines | DATE: month year. Separate updates with ---");setCt(r);}catch(e){setCe(e.message);}setCl(false);},[]);
  const fO=useCallback(async()=>{setCo(true);setCoe("");try{const r=await callClaude("Give 4 recent 2025 competitive engineering exam updates for India covering JEE Main, JEE Advanced, BITSAT, VITEEE, MHTCET, WBJEE. Cover registration deadlines, result dates, policy changes. Each: HEADLINE: text | DETAILS: 2-3 lines | DATE: month year. Separate with ---");setCc(r);}catch(e){setCoe(e.message);}setCo(false);},[]);
  return(<div><h2 className="sec-t">Latest Exam Announcements</h2><p className="sec-s">Static news cards below. Press AI Refresh for latest 2025 updates from Claude AI.</p>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:"7px",marginBottom:"9px"}}>
      <span style={{fontFamily:"Syne",fontSize:"13px",fontWeight:"800",color:"#FFF"}}>CBSE Board Updates</span>
      <button className="btn btn-o" disabled={cl} onClick={fC} style={{fontSize:"10px",padding:"5px 9px"}}>AI Refresh</button>
    </div>
    <div className="ngrid">{CBSE_NEWS.map(n=><div className={"nc "+n.cls} key={n.title}><div className="nc-cat">{n.cat}</div><div className="nc-title">{n.title}</div><div className="nc-body">{n.body}</div><div className="nc-date">{n.date}</div></div>)}</div>
    {cl&&<Loader/>}{ce&&<ErrBox msg={ce}/>}{ct&&<div className="ai-box" style={{marginBottom:"16px"}}><div className="ai-txt">{ct}</div></div>}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:"7px",margin:"18px 0 9px"}}>
      <span style={{fontFamily:"Syne",fontSize:"13px",fontWeight:"800",color:"#FFF"}}>Competitive Exam Announcements</span>
      <button className="btn btn-o" disabled={co} onClick={fO} style={{fontSize:"10px",padding:"5px 9px"}}>AI Refresh</button>
    </div>
    <div className="ngrid">{COMP_NEWS.map(n=><div className={"nc "+n.cls} key={n.title}><div className="nc-cat">{n.cat}</div><div className="nc-title">{n.title}</div><div className="nc-body">{n.body}</div><div className="nc-date">{n.date}</div></div>)}</div>
    {co&&<Loader/>}{coe&&<ErrBox msg={coe}/>}{cc&&<div className="ai-box"><div className="ai-txt">{cc}</div></div>}
  </div>);}

function CoursesTab(){
  const [cat,setCat]=useState("JEE / Engineering");const cats=Object.keys(COURSES_D);
  return(<div><h2 className="sec-t">Best Courses and Training</h2><p className="sec-s">Curated free and paid platforms for every subject and exam goal.</p>
  <div className="tw">{cats.map(c=><button key={c} className={"tbtn"+(cat===c?" sel":"")} onClick={()=>setCat(c)}>{c}</button>)}</div>
  <div className="cgrid">{COURSES_D[cat].map(c=><div className="cc" key={c.n}>
    <div className="cc-top"><div className="cc-name">{c.n}</div><span className={c.free?"cc-free":"cc-paid"}>{c.free?"FREE":"PAID"}</span></div>
    <div className="cc-sub">{c.sub}</div><div className="cc-desc">{c.d}</div>
    <a className="cc-link" href={"https://"+c.l} target="_blank" rel="noreferrer">Visit: {c.l}</a>
  </div>)}</div></div>);}

function AIUpdatesTab(){
  const [txt,setTxt]=useState("");const [load,setLoad]=useState(false);const [err,setErr]=useState("");const [done,setDone]=useState(false);
  const go=useCallback(async()=>{setLoad(true);setErr("");try{const r=await callClaude("You are a top educational counsellor for Indian engineering aspirants. Give 6 current actionable updates for Class XI PCM students preparing for JEE and BITSAT in 2025. Cover: (1) Latest NTA exam policy updates, (2) Best free study resources and apps right now, (3) Critical upcoming registration deadlines, (4) Most in-demand engineering specialisations, (5) Optimal Class XI study schedule strategy, (6) One motivational insight backed by real data. Use numbered sections with bold headings. Keep language crisp, practical, and encouraging. Assume today is May 2025.");setTxt(r);setDone(true);}catch(e){setErr(e.message);}setLoad(false);},[]);
  return(<div><h2 className="sec-t">AI Updates for Class XI Students</h2><p className="sec-s">Claude AI curated updates for 2025 engineering aspirants. Enter API key above then click Generate.</p>
  {!done&&!load&&!err&&<div className="hero"><div className="ico">AI</div><p>AI-curated current updates for Class XI PCM students preparing for JEE and BITSAT 2025.<br/>Enter your Anthropic API key in the orange banner above, then click the button below.</p><button className="btn" onClick={go}>Get Latest Updates</button></div>}
  {load&&<Loader/>}{err&&<ErrBox msg={err}/>}
  {done&&<><div className="ai-box"><div className="ai-txt">{txt}</div></div><div style={{marginTop:"10px"}}><button className="btn btn-o" onClick={go}>Refresh</button></div></>}
  </div>);}

const TABS=[
  {id:"prog",lbl:"Programs"},{id:"exinfo",lbl:"Entrance Exams"},{id:"enrl",lbl:"How to Enroll"},
  {id:"news",lbl:"Latest News"},{id:"ai",lbl:"AI Updates"},
  {id:"phy",lbl:"Physics XI"},{id:"chem",lbl:"Chemistry XI"},{id:"math",lbl:"Maths XI"},
  {id:"eng",lbl:"English XII"},{id:"py",lbl:"Python XII"},
  {id:"topicex",lbl:"Topic Exam"},{id:"compex",lbl:"Competitive Exams"},
  {id:"crs",lbl:"Best Courses"},
];

function App(){
  const [active,setActive]=useState("prog");
  const engPrompt=useCallback(t=>`You are a CBSE Class XII English expert examiner (India). For the topic "${t}" generate the TOP 10 MOST IMPORTANT QUESTIONS with complete Band 9 Full-marks Model Answers. Include this mix: 2 Extract-based questions (1 mark each) with full explanation, 2 Short Answer questions (3-4 marks) on character/theme/language, 3 Long Answer questions (6 marks) with detailed literary analysis, 1 Value-based or creative question (4-6 marks), 1 Summary/Comprehension question (3 marks), 1 Most likely board exam question (6 marks). For each question write: Q[number] ([marks] marks): [the question]. Model Answer: [complete Band 9 answer using paragraphs, literary devices, textual evidence, theme analysis. Show mark allocation clearly. Minimum 5-8 sentences for long answers.]. End with EXAMINER TIP: one key insight for scoring 100% on this topic.`,[]);
  const pyPrompt=useCallback(t=>`You are a CBSE Class XII Computer Science Python expert examiner (India). For the topic "${t}" generate TOP 10 MOST IMPORTANT QUESTIONS AND PROGRAMS with complete model answers. Use exactly this mix: 2 x 1-mark questions (output prediction or definition), 2 x 2-mark questions (short code or concept explanation), 3 x 3-mark questions (write a complete program), 2 x 5-mark questions (full program with input/output/detailed explanation), 1 x most-likely board exam question (3-5 marks). For each question: Q[number] ([marks] marks): [the question exactly as CBSE would ask it]. Answer: [complete model answer. For code questions: write properly indented Python 3 code with comments, show expected output, explain the logic in 2-3 lines.]. End with COMMON MISTAKES section listing what students typically get wrong. All code must be Python 3 compatible and match CBSE Class XII board difficulty.`,[]);
  return(<div>
    <div className="hdr">
      <div><div className="logo">INGENIA</div><div className="tagline">India's Engineering Intelligence Hub</div></div>
      <span className="pill">Class XI XII JEE CBSE</span>
    </div>
    <ApiKeyBanner/>
    <div className="tabbar">{TABS.map(t=><button key={t.id} className={"tb"+(active===t.id?" on":"")} onClick={()=>setActive(t.id)}>{t.lbl}</button>)}</div>
    <div className="page">
      {active==="prog"&&<ProgramsTab/>}
      {active==="exinfo"&&<ExamsInfoTab/>}
      {active==="enrl"&&<EnrollTab/>}
      {active==="news"&&<NewsTab/>}
      {active==="ai"&&<AIUpdatesTab/>}
      {active==="phy"&&<SubjectHub sub="Physics"/>}
      {active==="chem"&&<SubjectHub sub="Chemistry"/>}
      {active==="math"&&<SubjectHub sub="Mathematics"/>}
      {active==="eng"&&<AIGenTab title="Class XII English - Band 9 Model Answers" topics={ENG_TOPICS} promptFn={engPrompt}/>}
      {active==="py"&&<AIGenTab title="Class XII Python - Top 10 Programs and Q&A" topics={PY_TOPICS} promptFn={pyPrompt}/>}
      {active==="topicex"&&<TopicExam/>}
      {active==="compex"&&<CompExamHub/>}
      {active==="crs"&&<CoursesTab/>}
    </div>
  </div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
